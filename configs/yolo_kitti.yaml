# configs/yolo_kitti.yaml
# YOLOv8 training configuration for KITTI object detection

# ── Dataset ─────────────────────────────────────────────────────────────────
path: ../data/kitti_yolo        # Root dataset dir (after convert_kitti_to_yolo)
train: images/train             # Relative to 'path'
val: images/val
test:                           # Optional

# ── Classes ─────────────────────────────────────────────────────────────────
nc: 6                           # Number of classes
names:
  0: Car
  1: Pedestrian
  2: Cyclist
  3: Van
  4: Truck
  5: Misc

# ── Training Hyperparameters ─────────────────────────────────────────────────
# These override Ultralytics defaults — tuned for KITTI
epochs: 50
batch: 16
imgsz: 640
optimizer: AdamW
lr0: 0.001                      # Initial learning rate
lrf: 0.01                       # Final lr = lr0 * lrf
momentum: 0.937
weight_decay: 0.0005
warmup_epochs: 3.0
warmup_momentum: 0.8
warmup_bias_lr: 0.1
box: 7.5                        # Box loss gain
cls: 0.5                        # Classification loss gain
dfl: 1.5                        # Distribution focal loss gain
pose: 12.0
kobj: 1.0
label_smoothing: 0.0
nbs: 64                         # Nominal batch size

# ── Augmentation ─────────────────────────────────────────────────────────────
hsv_h: 0.015                    # Hue augmentation
hsv_s: 0.7                      # Saturation
hsv_v: 0.4                      # Value
degrees: 0.0                    # Rotation (keep 0 for driving — cars don't flip vertically)
translate: 0.1
scale: 0.5
shear: 0.0
perspective: 0.0
flipud: 0.0                     # No vertical flip for driving scenes
fliplr: 0.5                     # Horizontal flip OK
mosaic: 1.0                     # Mosaic augmentation (very useful)
mixup: 0.1
copy_paste: 0.0

# ── Model ────────────────────────────────────────────────────────────────────
model: yolov8m.pt               # Pre-trained weights: n/s/m/l/x variants
pretrained: true

# ── Training Setup ───────────────────────────────────────────────────────────
device: 0                       # GPU index, or 'cpu', or '0,1' for multi-GPU
workers: 8
project: runs/yolo
name: kitti_v1
exist_ok: false
patience: 15                    # Early stopping patience
save: true
save_period: 10                 # Save checkpoint every N epochs
cache: false                    # Set true to cache images in RAM (needs ~16GB)
amp: true                       # Automatic Mixed Precision

# ── Evaluation ───────────────────────────────────────────────────────────────
val: true
plots: true                     # Save training plots
conf: 0.25                      # Confidence threshold for evaluation
iou: 0.7                        # NMS IoU threshold
max_det: 300                    # Max detections per image