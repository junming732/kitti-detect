# configs/yolo_kitti.yaml
# YOLOv8 training configuration for KITTI object detection

# ── Dataset ─────────────────────────────────────────────────────────────────
path: /proj/uppmax2025-2-346/nobackup/private/junming/kitti-detect-data/kitti_yolo
train: images/train
val: images/val
test:

# ── Classes ─────────────────────────────────────────────────────────────────
nc: 6
names:
  0: Car
  1: Pedestrian
  2: Cyclist
  3: Van
  4: Truck
  5: Misc

# ── Training Hyperparameters ─────────────────────────────────────────────────
epochs: 50
batch: 16
imgsz: 640
optimizer: AdamW
lr0: 0.001
lrf: 0.01
momentum: 0.937
weight_decay: 0.0005
warmup_epochs: 3.0
warmup_momentum: 0.8
warmup_bias_lr: 0.1
box: 7.5
cls: 0.5
dfl: 1.5
pose: 12.0
kobj: 1.0
label_smoothing: 0.0
nbs: 64

# ── Augmentation ─────────────────────────────────────────────────────────────
hsv_h: 0.015
hsv_s: 0.7
hsv_v: 0.4
degrees: 0.0
translate: 0.1
scale: 0.5
shear: 0.0
perspective: 0.0
flipud: 0.0
fliplr: 0.5
mosaic: 1.0
mixup: 0.1
copy_paste: 0.0

# ── Model ────────────────────────────────────────────────────────────────────
model: yolov8m.pt
pretrained: true

# ── Training Setup ───────────────────────────────────────────────────────────
device: 0
workers: 8
project: runs/yolo
name: kitti_v1
exist_ok: false
patience: 15
save: true
save_period: 10
cache: false
amp: true

# ── Evaluation ───────────────────────────────────────────────────────────────
# val and plots intentionally omitted — set in trainer args to avoid
# overwriting the val: images/val dataset path above (YAML last-key-wins)
conf: 0.25
iou: 0.7
max_det: 300